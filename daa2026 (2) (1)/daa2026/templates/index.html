<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1 class="title">Pathfinder</h1>
            
            <div class="control-group">
                <label for="src">Source</label>
                <select id="src">
                    {% for id, node in nodes.items() %}
                        <option value="{{ id }}">{{ node.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="control-group">
                <label for="dest">Destination</label>
                <select id="dest" class="dest-select">
                    {% for id, node in nodes.items() %}
                        <option value="{{ id }}" {% if id == 1 %}selected{% endif %}>{{ node.name }}</option>
                    {% endfor %}
                </select>
            </div>



            <button id="calculate-btn" class="primary-btn">Calculate Route</button>

            <div id="results" class="results-container hidden">
                <h3>Route Metrics</h3>
                <div class="metrics">
                    <div class="metric-card">
                        <span class="metric-label">Distance</span>
                        <span class="metric-value" id="res-distance">-</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Time</span>
                        <span class="metric-value" id="res-time">-</span>
                    </div>
                </div>



                <div class="path-details">
                    <strong>Optimal Path:</strong>
                    <div id="res-path" class="path-string">-</div>
                </div>
            </div>
            
        </aside>
        
        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Pass backend data to JS -->
    <script>
        window.NODES_DATA = {{ nodes | tojson }};
    </script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
